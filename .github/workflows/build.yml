name: Build and publish

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.14"
  POETRY_VERSION: "2.2.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-version:
    name: Set version info
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Save version to output
        id: version
        run: |
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Display version
        run: echo "Version ${{ steps.version.outputs.version }}"

  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure poetry
        run: poetry config virtualenvs.create false

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Build
        run: poetry build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  build-binaries:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - set-version
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: finnbar
            artifact: finnbar-linux
            extension: ""
          - os: macos-latest
            binary: finnbar
            artifact: finnbar-macos
            extension: ""
          - os: windows-latest
            binary: finnbar.exe
            artifact: finnbar-windows
            extension: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Configure poetry
        run: poetry config virtualenvs.create false

      - name: Install project dependencies
        run: poetry install --no-interaction --with build

      - name: Build binary
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name finnbar \
            --collect-all textual \
            --add-data "finnbar/app.tcss:finnbar" \
            --add-data "finnbar/stores.json:finnbar" \
            finnbar/__main__.py

      - name: Set binary name
        shell: bash
        run: echo "BINARY_NAME=${{ matrix.artifact }}-${{ needs.set-version.outputs.version }}${{ matrix.extension }}" >> $GITHUB_ENV

      - name: Rename binary
        shell: bash
        run: mv dist/${{ matrix.binary }} dist/${{ env.BINARY_NAME }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}
          path: dist/${{ env.BINARY_NAME }}

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs:
      - build
      - build-binaries
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    needs:
      - set-version
      - publish
      - build-binaries
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          pattern: finnbar-*
          path: binaries/
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ needs.set-version.outputs.version }}
          tag_name: ${{ needs.set-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: binaries/*
